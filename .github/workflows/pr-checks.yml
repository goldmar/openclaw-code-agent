name: PR Checks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  size-check:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
          persist-credentials: false
          submodules: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.15.1

      - name: Prefer configured pnpm binary
        run: echo "$PNPM_HOME/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.22.3
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Check bundle size
        id: bundle-size
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const fs = require('fs');

            const distFile = 'dist/index.js';
            const maxSizeBytes = 600 * 1024; // 600 KB

            if (!fs.existsSync(distFile)) {
              core.setFailed(`Build artifact not found: ${distFile}`);
              return;
            }

            const sizeBytes = fs.statSync(distFile).size;
            const sizeKb = (sizeBytes / 1024).toFixed(1);
            const overLimit = sizeBytes > maxSizeBytes;
            const status = overLimit ? '❌ EXCEEDS LIMIT' : '✅ Within limit';

            const body = [
              '## Bundle Size Report',
              '',
              '| File | Size | Limit | Status |',
              '|------|------|-------|--------|',
              `| \`dist/index.js\` | ${sizeKb} KB | 600 KB | ${status} |`,
              '',
              overLimit
                ? '> ⚠️ **Bundle exceeds the 600 KB limit.** Please reduce bundle size before merging.'
                : '> Bundle is within the 600 KB limit.',
            ].join('\n');

            core.setOutput('body', body);
            core.setOutput('size_kb', sizeKb);
            core.setOutput('over_limit', overLimit ? 'true' : 'false');
            await core.summary.addRaw(body, true).write();

      - name: Comment bundle size on PR
        if: github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          COMMENT_BODY: ${{ steps.bundle-size.outputs.body }}
        with:
          script: |
            const body = process.env.COMMENT_BODY;
            if (!body) {
              core.info('No bundle size report body was generated.');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              c => c.user.login === 'github-actions[bot]' && c.body.includes('## Bundle Size Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if bundle exceeds limit
        if: steps.bundle-size.outputs.over_limit == 'true'
        run: |
          echo "Bundle size ${{ steps.bundle-size.outputs.size_kb }} KB exceeds the 600 KB limit."
          exit 1

  lockfile-check:
    name: Lockfile Integrity Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
          persist-credentials: false
          submodules: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.15.1

      - name: Prefer configured pnpm binary
        run: echo "$PNPM_HOME/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.22.3
          cache: pnpm

      - name: Verify lockfile is in sync
        id: lockfile
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Comment on PR if lockfile is out of sync
        if: steps.lockfile.outcome == 'failure' && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const body = [
              '## ⚠️ Lockfile Out of Sync',
              '',
              'The `pnpm-lock.yaml` file is out of sync with `package.json`.',
              '',
              'This happens when `package.json` is updated but the lockfile is not regenerated.',
              '',
              '**To fix, run locally:**',
              '```bash',
              'pnpm install',
              'git add pnpm-lock.yaml',
              'git commit -m "chore: update pnpm lockfile"',
              '```',
              '',
              '> Always commit `pnpm-lock.yaml` alongside any changes to `package.json`.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if lockfile was out of sync
        if: steps.lockfile.outcome == 'failure'
        run: |
          echo "ERR_PNPM_OUTDATED_LOCKFILE: pnpm-lock.yaml is out of sync with package.json."
          echo "Run 'pnpm install' locally and commit the updated lockfile."
          exit 1
