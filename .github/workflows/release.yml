name: Release

# Triggered by a version tag push (e.g. v2.3.2) or manually via workflow_dispatch.
#
# SETUP REQUIRED (one-time, on npmjs.com):
#   1. Go to npmjs.com → package "openclaw-code-agent" → Settings → Trusted Publishers
#   2. Click "GitHub Actions" and configure:
#      - Organization/user: goldmar
#      - Repository: openclaw-code-agent
#      - Workflow filename: release.yml
#   No secrets or tokens needed — OIDC handles authentication automatically.
#   Trusted Publishing requires npm CLI 11.5.1+.
#   This workflow verifies on Node 22, then switches to Node 24 for publish so npm
#   already satisfies the Trusted Publishing minimum without a brittle in-place upgrade.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3 — no leading v)'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write  # required to create GitHub releases
  id-token: write  # required for npm Trusted Publishing (OIDC)

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so CHANGELOG extraction works
          persist-credentials: false
          submodules: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm run verify

      # ── Resolve version ───────────────────────────────────────────────────────

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF_NAME}"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate release version
        run: |
          pnpm run validate:release-metadata -- "${{ steps.version.outputs.version }}"

      # ── Publish to npm ────────────────────────────────────────────────────────

      - name: Setup Node.js for publish
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify npm for Trusted Publishing
        run: |
          node --version
          NPM_VERSION="$(npm --version)"
          echo "npm ${NPM_VERSION}"
          IFS=. read -r NPM_MAJOR NPM_MINOR NPM_PATCH <<EOF
          ${NPM_VERSION}
          EOF
          if [ "${NPM_MAJOR}" -lt 11 ] || { [ "${NPM_MAJOR}" -eq 11 ] && { [ "${NPM_MINOR}" -lt 5 ] || { [ "${NPM_MINOR}" -eq 5 ] && [ "${NPM_PATCH}" -lt 1 ]; }; }; }; then
            echo "npm 11.5.1+ is required for Trusted Publishing, found ${NPM_VERSION}" >&2
            exit 1
          fi

      - name: Publish to npm
        # Trusted Publishing generates provenance automatically for public packages
        # from public repositories once npm can authenticate via OIDC.
        run: npm publish --access public

      # ── Create GitHub release ─────────────────────────────────────────────────

      - name: Extract CHANGELOG entry for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract the section between this version heading and the next one
          NOTES=$(awk "/^## \[?${VERSION}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](./CHANGELOG.md) for details."
          fi
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const tag = '${{ steps.version.outputs.tag }}';
            const version = '${{ steps.version.outputs.version }}';
            const notes = fs.readFileSync('/tmp/release-notes.md', 'utf8').trim();

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `v${version}`,
              body: notes || `Release ${tag}`,
              draft: false,
              prerelease: tag.includes('-'),
            });
